publications:
  - title: "The long-term hazard cascade of an unprecedented wildfire in a tropical mountain ecosystem"
    authors: "Veness, W., Day, M., Ross, A.C., et al."
    year: 2026
    journal: "Natural Hazards and Earth System Sciences"
    volume: "26"
    doi: "https://doi.org/10.5194/nhess-26-3045-2026"
    url: "https://nhess.copernicus.org/articles/26/3045/2026/"
    description: "Communities in the lowlands of the Rwenzori Mountains have been exposed to a series of cascading hazards including flooding, landslides, erosion and water pollution following an unprecedented 2012 wildfire in the high mountains. Here, our team analyses the long-term cascade which followed the wildfire, highlighting the emergent risk of high-mountain tropical fires as a priority for disaster management."
    image: "/assets/img/highlights/Veness2026.jpg"
  
