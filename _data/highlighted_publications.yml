    url: "https://agupubs.onlinelibrary.wiley.com/doi/10.1029/2026EF008149"
    description: "A study to investigate the role of glacier-wetland hydrological connectivity in sustaining high-altitude wetlands in the Peruvian Andes."
    image: "/assets/img/highlights/Xuan2026.jpeg"

